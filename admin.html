<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background:  #e0f2fe;
            color: #1e293b;
            line-height: 1.6;
        }
        /* Login Page */
        #login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        #login-container h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            color: #0f172a;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #334155;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #2563eb;
        }
        #login-error {
            color: #dc2626;
            margin-top: 15px;
            text-align: center;
        }
        /* Dashboard Layout (hidden initially) */
        #dashboard {
            display: none;
            min-height: 100vh;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.03);
            padding: 30px 20px;
        }
        .sidebar h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar h3 i {
            color: #3b82f6;
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar li {
            margin-bottom: 10px;
        }
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #334155;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s;
            font-weight: 500;
        }
        .sidebar a:hover, .sidebar a.active {
            background: #f1f5f9;
            color: #0f172a;
        }
        .sidebar a i {
            width: 24px;
            color: #64748b;
        }
        .main-content {
            margin-left: 260px;
            padding: 30px 40px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
        }
        .logout-btn {
            background: #ef4444;
            width: auto;
            padding: 10px 20px;
        }
        .logout-btn:hover {
            background: #dc2626;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 12px 8px;
            background: #f8fafc;
            font-weight: 600;
            color: #475569;
        }
        td {
            padding: 12px 8px;
            border-bottom: 1px solid #e2e8f0;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-completed { background: #dcfce7; color: #166534; }
        .status-processing { background: #fef9c3; color: #854d0e; }
        .status-failed { background: #fee2e2; color: #991b1b; }
        /* Messages area */
        .message-input {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .message-input textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            resize: vertical;
            min-height: 80px;
        }
        .message-input button {
            width: auto;
            padding: 12px 24px;
        }
        .message-list {
            list-style: none;
        }
        .message-item {
            background: #f8fafc;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .message-content {
            flex: 1;
        }
        .message-time {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.2rem;
            width: auto;
            padding: 0 8px;
        }
        .delete-btn:hover {
            color: #dc2626;
        }
    </style>
</head>
<body>
    <!-- Login Container -->
    <div id="login-container">
        <h2><i class="fas fa-lock" style="margin-right: 10px;"></i>Admin Login</h2>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="admin@example.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="login-btn">Login</button>
        <div id="login-error"></div>
<a href="index.html">
<button>Home</button>
</a>
    </div>
	


    <!-- Dashboard (hidden until login) -->
    <div id="dashboard">
        <div class="sidebar">
            <h3><i class="fas fa-cube"></i> Admin</h3>
            <ul>
                <li><a href="#" class="nav-link active" data-tab="orders"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                <li><a href="#" class="nav-link" data-tab="messages"><i class="fas fa-comment-dots"></i> Messages</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div class="header">
                <h1 id="tab-title">Orders</h1>
                <button id="logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>

            <!-- Orders Tab Content -->
            <div id="orders-tab" class="tab-content">
                <div class="card">
                    <h2><i class="fas fa-list"></i> All Orders</h2>
                    <div style="overflow-x: auto;">
                        <table id="orders-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Product</th>
                                    <th>Qty</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody id="orders-body">
                                <tr><td colspan="7">Loading orders...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Messages Tab Content (hidden initially) -->
            <div id="messages-tab" class="tab-content" style="display: none;">
                <div class="card">
                    <h2><i class="fas fa-pen"></i> Post New Message</h2>
                    <div class="message-input">
                        <textarea id="new-message" placeholder="Type your message here..."></textarea>
                        <button id="post-message-btn">Post Message</button>
                    </div>
                </div>
                <div class="card">
                    <h2><i class="fas fa-history"></i> Previous Messages</h2>
                    <ul class="message-list" id="message-list">
                        <li>Loading messages...</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Firebase configuration (replace with your own)
        const firebaseConfig = {
          apiKey: "AIzaSyDwHlMKLkukQ_fpubU98rEMxYmfPoRZ0kI",
  authDomain: "hotel-jalsagar.firebaseapp.com",
  projectId: "hotel-jalsagar",
  storageBucket: "hotel-jalsagar.firebasestorage.app",
  messagingSenderId: "873304480297",
  appId: "1:873304480297:web:1137c0b2c01fe1a7c71a38",
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // DOM elements
        const loginContainer = document.getElementById('login-container');
        const dashboard = document.getElementById('dashboard');
        const loginBtn = document.getElementById('login-btn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout');
        const navLinks = document.querySelectorAll('.nav-link');
        const ordersTab = document.getElementById('orders-tab');
        const messagesTab = document.getElementById('messages-tab');
        const tabTitle = document.getElementById('tab-title');
        const ordersBody = document.getElementById('orders-body');
        const newMessage = document.getElementById('new-message');
        const postBtn = document.getElementById('post-message-btn');
        const messageList = document.getElementById('message-list');

        // Auth state observer
        auth.onAuthStateChanged(user => {
            if (user) {
                // User is logged in
                loginContainer.style.display = 'none';
                dashboard.style.display = 'block';
                loadOrders();
                loadMessages();
                setupRealtimeMessages();
            } else {
                loginContainer.style.display = 'block';
                dashboard.style.display = 'none';
            }
        });

        // Login
        loginBtn.addEventListener('click', () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            loginError.textContent = '';
            auth.signInWithEmailAndPassword(email, password)
                .catch(error => {
                    loginError.textContent = error.message;
                });
        });

        // Logout
        logoutBtn.addEventListener('click', () => {
            auth.signOut();
        });

        // Navigation tabs
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                navLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                const tab = link.dataset.tab;
                if (tab === 'orders') {
                    ordersTab.style.display = 'block';
                    messagesTab.style.display = 'none';
                    tabTitle.textContent = 'Orders';
                } else {
                    ordersTab.style.display = 'none';
                    messagesTab.style.display = 'block';
                    tabTitle.textContent = 'Messages';
                }
            });
        });

        // Load orders from Firebase
        function loadOrders() {
            const ordersRef = db.ref('orders');
            ordersRef.on('value', snapshot => {
                const orders = snapshot.val();
                let html = '';
                if (!orders) {
                    html = '<tr><td colspan="7">No orders found.</td></tr>';
                } else {
                    Object.entries(orders).forEach(([id, order]) => {
                        const date = order.timestamp ? new Date(order.timestamp).toLocaleString() : 'N/A';
                        const status = order.paymentStatus || 'unknown';
                        const statusClass = status === 'completed' ? 'status-completed' : (status === 'processing' ? 'status-processing' : 'status-failed');
                        const amount = order.amount ? `$${order.amount}` : '-';
                        html += `<tr>
                            <td>${order.name || ''}</td>
                            <td>${order.email || ''}</td>
                            <td>${order.product || ''}</td>
                            <td>${order.quantity || ''}</td>
                            <td>${amount}</td>
                            <td><span class="status-badge ${statusClass}">${status}</span></td>
                            <td>${date}</td>
                        </tr>`;
                    });
                }
                ordersBody.innerHTML = html;
            });
        }

        // Load messages initially
        function loadMessages() {
            const messagesRef = db.ref('messages');
            messagesRef.orderByChild('timestamp').once('value', snapshot => {
                renderMessages(snapshot);
            });
        }

        // Realtime listener for messages
        function setupRealtimeMessages() {
            const messagesRef = db.ref('messages');
            messagesRef.orderByChild('timestamp').on('value', snapshot => {
                renderMessages(snapshot);
            });
        }

        // Render messages list (most recent first)
        function renderMessages(snapshot) {
            const messages = snapshot.val();
            if (!messages) {
                messageList.innerHTML = '<li>No messages yet.</li>';
                return;
            }
            let html = '';
            // Convert to array and sort by timestamp desc
            const messagesArray = Object.entries(messages).map(([id, msg]) => ({ id, ...msg }));
            messagesArray.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            messagesArray.forEach(msg => {
                const time = msg.timestamp ? new Date(msg.timestamp).toLocaleString() : '';
                html += `
                    <li class="message-item">
                        <div class="message-content">
                            <div>${msg.text}</div>
                            <div class="message-time">${time}</div>
                        </div>
                        <button class="delete-btn" data-id="${msg.id}"><i class="fas fa-trash"></i></button>
                    </li>
                `;
            });
            messageList.innerHTML = html;

            // Attach delete handlers
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.currentTarget.dataset.id;
                    db.ref('messages').child(id).remove()
                        .catch(err => alert('Delete failed: ' + err.message));
                });
            });
        }

        // Post new message
        postBtn.addEventListener('click', () => {
            const text = newMessage.value.trim();
            if (!text) return;
            const messagesRef = db.ref('messages');
            messagesRef.push({
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                newMessage.value = '';
            }).catch(err => alert('Post failed: ' + err.message));
        });
    </script>
</body>
</html>
